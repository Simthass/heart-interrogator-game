<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Round Results - The Heart Interrogator</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/results.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="results-page">
    <div id="header-placeholder"></div>
    <div class="results-container">
      <div class="results-header">
        <h1 class="results-title">
          <i class="fas fa-clipboard-list" style="margin-right: 10px"></i
          >INTERROGATION COMPLETE
        </h1>
        <p class="results-subtitle" id="resultSubtitle">Final Status Report</p>
      </div>

      <div class="results-layout">
        <div class="main-results panel-box">
          <div class="score-display">
            <div class="star-icon" id="statusIcon">
              <i class="fas fa-star"></i>
            </div>
            <h2 class="points-earned" id="finalScoreText">+0 POINTS</h2>
          </div>

          <div class="results-table">
            <h3><i class="fas fa-table"></i> Case History</h3>
            <table>
              <thead>
                <tr>
                  <th>Round</th>
                  <th>Decision</th>
                  <th>AI Said</th>
                  <th>Answer</th>
                  <th>Points</th>
                </tr>
              </thead>
              <tbody id="resultsTableBody"></tbody>
            </table>
          </div>

          <div class="summary-stats">
            <div class="summary-item">
              <span class="summary-label">Accuracy:</span
              ><span class="summary-value" id="accRate">0%</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Trusts:</span
              ><span class="summary-value" id="trustCount">0</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Verifies:</span
              ><span class="summary-value" id="verifyCount">0</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Lives:</span
              ><span class="summary-value" id="finalLives">❤️ 0</span>
            </div>
          </div>

          <div class="action-buttons">
            <button class="btn-continue" onclick="playAgain()">
              <i class="fas fa-redo-alt"></i> PLAY AGAIN
            </button>
            <button class="btn-dashboard" onclick="goToDashboard()">
              <i class="fas fa-home"></i> DASHBOARD
            </button>
          </div>
        </div>

        <div class="side-panels">
          <div class="achievement-panel panel-box">
            <h3><i class="fas fa-medal"></i> STATUS</h3>
            <div class="achievement-badge-large" id="perfBadge">
              <i class="fas fa-chart-line"></i>
            </div>
            <p class="achievement-name" id="perfName">Processing...</p>
            <p class="achievement-desc" id="perfDesc">Waiting for data.</p>
          </div>

          <div class="analysis-panel panel-box">
            <h3><i class="fas fa-robot"></i> AI ANALYSIS</h3>
            <p class="analysis-text" id="aiLieRate">
              AI was deceptive on 0 questions.
            </p>
            <p class="recommendation">
              <strong>Note:</strong>
              <span id="sysNote">Data saved to storage.</span>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="js/home.js"></script>
    <script src="js/results.js"></script>
    <script>
      // load header into results
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("header-placeholder").innerHTML = data;
          if (window.updateHeaderAuth) window.updateHeaderAuth();
          if (window.setActiveNav) window.setActiveNav();
        })
        .catch((err) => console.log("header load error:", err));
    </script>
  </body>
</html>
