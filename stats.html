<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Stats - The Heart Interrogator</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="page-main">
      <div class="page-header">
        <h1 class="page-title">
          <i class="fas fa-chart-bar" style="margin-right: 10px"></i>MY
          STATISTICS
        </h1>
        <p class="page-subtitle">Track your performance and progress</p>
      </div>

      <div class="profile-section">
        <div class="profile-card-big">
          <div class="profile-avatar"><i class="fas fa-user-secret"></i></div>
          <div class="profile-info">
            <h2 class="profile-name" id="profNameTag">Loading...</h2>
            <p class="profile-username" id="profUserTag">@loading</p>
            <div class="rank-display">
              <span class="rank-badge" id="rankBadge"
                ><i class="fas fa-medal"></i> DETECTIVE</span
              >
            </div>
          </div>
        </div>
      </div>

      <div class="stats-section">
        <h2 class="section-heading">
          <i class="fas fa-chart-pie" style="margin-right: 8px"></i>PERFORMANCE
          OVERVIEW
        </h2>
        <div class="stats-grid-large">
          <div class="stat-card">
            <i class="fas fa-star"></i>
            <div class="stat-number" id="totScoreDisplay">0</div>
            <div class="stat-name">Total Score</div>
          </div>
          <div class="stat-card">
            <i class="fas fa-check-circle"></i>
            <div class="stat-number" id="winsDisplay">0</div>
            <div class="stat-name">Cases Solved</div>
          </div>
          <div class="stat-card">
            <i class="fas fa-bullseye"></i>
            <div class="stat-number" id="accDisplay">0%</div>
            <div class="stat-name">Avg Accuracy</div>
          </div>
          <div class="stat-card">
            <i class="fas fa-gamepad"></i>
            <div class="stat-number" id="gamesPlayedDisplay">0</div>
            <div class="stat-name">Games Played</div>
          </div>
        </div>
      </div>

      <div class="recent-section">
        <h2 class="section-heading">
          <i class="fas fa-history" style="margin-right: 8px"></i>RECENT GAMES
        </h2>
        <div class="recent-games" id="recentGamesBox">
          <p style="text-align: center; padding: 20px">Loading games...</p>
        </div>
      </div>

      <div class="achievements-section">
        <h2 class="section-heading">
          <i class="fas fa-trophy" style="margin-right: 8px"></i>ACHIEVEMENTS
        </h2>
        <div class="achievements-grid" id="achievementsGrid">
          <!-- achievements will be loaded here -->
        </div>
      </div>
    </main>

    <footer class="main-footer">
      <p>
        Developed by Simthass Mohammed (2540927) for DSA Assignment |
        <i class="fas fa-code"></i> with 🧠 and ☕
      </p>
    </footer>

    <script src="js/home.js"></script>
    <script>
      // cookie helper
      function getCookie(name) {
        let match = document.cookie.match(
          new RegExp("(^| )" + name + "=([^;]+)"),
        );
        return match ? match[2] : null;
      }

      // load header
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("header-placeholder").innerHTML = data;
          if (window.updateHeaderAuth) window.updateHeaderAuth();
          if (window.setActiveNav) window.setActiveNav();

          // after header is ready load the stats
          checkLoginAndLoadStats();
        })
        .catch((err) => {
          console.log("header load error:", err);
        });

      async function checkLoginAndLoadStats() {
        let secureToken = getCookie("authToken");
        let username = getCookie("loggedUser");

        if (!secureToken || secureToken === "") {
          document.getElementById("profNameTag").innerText = "Not Logged In";
          document.getElementById("profUserTag").innerText = "@guest";
          document.getElementById("recentGamesBox").innerHTML =
            '<p style="text-align: center; padding: 20px;">Please login to see your secure stats.</p>';
          return;
        }

        // update profile info
        document.getElementById("profNameTag").innerText = username;
        document.getElementById("profUserTag").innerText = "@" + username;

        updateRank(0);

        // fetch user info using JWT
        try {
          let infoRes = await fetch("http://localhost:3000/api/user-info", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + secureToken,
            },
            body: JSON.stringify({}), // empty body cuz token has id
          });
          let infoData = await infoRes.json();
          if (infoRes.ok) {
            document.getElementById("profNameTag").innerText =
              infoData.fullname || username;
          }
        } catch (e) {
          console.log("info fetch error:", e);
        }

        // fetch secure stats
        try {
          let statsRes = await fetch("http://localhost:3000/api/my-stats", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + secureToken,
            },
            body: JSON.stringify({}),
          });

          let statsData = await statsRes.json();

          if (statsRes.ok) {
            document.getElementById("totScoreDisplay").innerText =
              statsData.totalScore || 0;
            document.getElementById("winsDisplay").innerText =
              statsData.wins || 0;
            document.getElementById("accDisplay").innerText =
              (statsData.avgAccuracy || 0) + "%";
            document.getElementById("gamesPlayedDisplay").innerText =
              statsData.gamesPlayed || 0;
            updateRank(statsData.wins || 0);
          }
        } catch (e) {
          console.log("stats fetch error:", e);
        }

        // fetch secure recent games
        try {
          let recentRes = await fetch(
            "http://localhost:3000/api/recent-games",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + secureToken,
              },
              body: JSON.stringify({}),
            },
          );

          let recentData = await recentRes.json();
          let gamesBox = document.getElementById("recentGamesBox");

          if (recentRes.ok && recentData.length > 0) {
            gamesBox.innerHTML = "";
            for (let i = 0; i < recentData.length; i++) {
              let game = recentData[i];
              let date = new Date(game.playDate);
              let dateStr =
                date.toLocaleDateString() + " " + date.toLocaleTimeString();
              let winClass = game.isWin ? "success" : "fail";
              let winIcon = game.isWin ? "fa-check-circle" : "fa-times-circle";
              let winText = game.isWin ? "Won" : "Lost";

              gamesBox.innerHTML += `
                <div class="game-record">
                  <span class="record-date"><i class="far fa-calendar"></i> ${dateStr}</span>
                  <span class="record-score" style="color: ${game.isWin ? "var(--coral)" : "#ff4d4d"}">${game.score} pts</span>
                  <span class="record-status ${winClass}"><i class="fas ${winIcon}"></i> ${winText}</span>
                </div>
              `;
            }
          } else {
            gamesBox.innerHTML =
              '<p style="text-align: center; padding: 20px;">No games played yet!</p>';
          }
        } catch (e) {
          console.log("recent games error:", e);
          document.getElementById("recentGamesBox").innerHTML =
            '<p style="text-align: center; padding: 20px;">Error loading games.</p>';
        }

        loadAchievements();
      }

      function updateRank(wins) {
        let rankBadge = document.getElementById("rankBadge");
        let rankText = "DETECTIVE";
        let rankIcon = "fa-medal";

        if (wins >= 20) {
          rankText = "MASTER DETECTIVE";
        } else if (wins >= 10) {
          rankText = "INSPECTOR";
        } else if (wins >= 5) {
          rankText = "SERGEANT";
        } else if (wins >= 1) {
          rankText = "OFFICER";
        } else {
          rankText = "CADET";
          rankIcon = "fa-user-graduate";
        }

        rankBadge.innerHTML = `<i class="fas ${rankIcon}"></i> ${rankText}`;
      }

      function loadAchievements() {
        let achievementsGrid = document.getElementById("achievementsGrid");
        let wins =
          parseInt(document.getElementById("winsDisplay").innerText) || 0;
        let gamesPlayed =
          parseInt(document.getElementById("gamesPlayedDisplay").innerText) ||
          0;
        let accuracy =
          parseInt(document.getElementById("accDisplay").innerText) || 0;

        achievementsGrid.innerHTML = `
          <div class="achievement-badge-item ${wins >= 1 ? "" : "locked"}">
            <i class="fas fa-crown"></i>
            <div class="badge-name">First Victory</div>
            <small>${wins >= 1 ? "Unlocked" : "Win 1 game"}</small>
          </div>
          <div class="achievement-badge-item ${gamesPlayed >= 5 ? "" : "locked"}">
            <i class="fas fa-gamepad"></i>
            <div class="badge-name">Veteran</div>
            <small>${gamesPlayed >= 5 ? "Unlocked" : "Play 5 games"}</small>
          </div>
          <div class="achievement-badge-item ${accuracy >= 70 ? "" : "locked"}">
            <i class="fas fa-bullseye"></i>
            <div class="badge-name">Sharpshooter</div>
            <small>${accuracy >= 70 ? "Unlocked" : "70% accuracy"}</small>
          </div>
          <div class="achievement-badge-item ${wins >= 10 ? "" : "locked"}">
            <i class="fas fa-skull"></i>
            <div class="badge-name">Master Detective</div>
            <small>${wins >= 10 ? "Unlocked" : "Win 10 games"}</small>
          </div>
        `;
      }
    </script>
  </body>
</html>
