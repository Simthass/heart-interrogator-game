<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interrogation Room - The Heart Interrogator</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/game.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="game-body">
    <div class="game-top-bar">
      <div class="game-info-left">
        <img src="public/Logo.png" alt="Logo" class="game-logo-mini" />
        <div class="info-item">
          <i class="far fa-clock"></i
          ><span>R<span id="currentRound">1</span>/10</span>
        </div>
        <div class="info-item lives-count">
          <i class="fas fa-heart" style="color: #fe9e84"></i
          ><span id="livesDisplay">3</span>
        </div>
      </div>

      <div class="game-info-center">
        <div class="timer-display">
          <div class="timer-circle" id="timerCircle">
            <span id="timerText">10</span>
          </div>
        </div>
      </div>

      <div class="game-info-right">
        <div class="info-item">
          <i class="fas fa-star" style="color: #fe9e84"></i
          ><span id="scoreValue">0</span>
        </div>
        <div class="info-item">
          <i class="fas fa-fire" style="color: #fe9e84"></i
          ><span id="streakValue">0</span>
        </div>
        <button
          class="exit-btn"
          onclick="window.location.href = 'results.html'"
        >
          <i class="fas fa-times"></i> ABORT
        </button>
      </div>
    </div>

    <div class="game-container">
      <div class="suspect-section panel-box">
        <div class="section-title"><i class="fas fa-robot"></i> AI SUSPECT</div>
        <div class="suspect-content">
          <div class="robot-icon"><i class="fas fa-robot"></i></div>
          <div class="suspect-claim">
            <div class="claim-label">CLAIMS</div>
            <div class="claim-number" id="suspectAnswer">?</div>
          </div>

          <div class="confidence-meter" id="meterBoxDiv">
            <div class="conf-label">
              <span>CONF</span><span id="confValue">0%</span>
            </div>
            <div class="conf-bar">
              <div class="conf-fill" id="confFill" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="evidence-section panel-box">
        <div class="section-title"><i class="fas fa-search"></i> EVIDENCE</div>
        <div class="evidence-frame">
          <div class="puzzle-image" id="imageContainer">
            <div class="image-placeholder" id="loadingState">
              <i class="fas fa-circle-notch fa-spin"></i><span>LOADING...</span
              ><small>Heart API</small>
            </div>
            <img
              id="apiImage"
              src=""
              alt="Heart Puzzle"
              style="
                display: none;
                max-width: 100%;
                max-height: 100%;
                border-radius: 10px;
                transition: 0.1s;
              "
            />
          </div>
        </div>
        <div class="evidence-instruction" id="feedbackText">
          <i class="fas fa-info-circle"></i> Counting...
        </div>
      </div>

      <div class="decision-section panel-box">
        <div class="section-title"><i class="fas fa-gavel"></i> DECISION</div>
        <div
          class="decision-content"
          id="decisionWrapBox"
          style="display: flex; flex-direction: column"
        >
          <div class="decision-card" id="trustCardBox" style="order: 1">
            <i class="fas fa-handshake"></i>
            <div class="card-title">TRUST</div>
            <div class="card-info">Accept AI answer</div>
            <div class="card-points">+20</div>
            <button
              class="decision-btn trust-btn"
              onclick="trustSuspect(event)"
            >
              <i class="fas fa-check-circle"></i> TRUST
            </button>
          </div>

          <div class="decision-card" id="verifyCardBox" style="order: 2">
            <i class="fas fa-search"></i>
            <div class="card-title">VERIFY</div>
            <div class="card-info">Count yourself</div>
            <div class="card-points">+10</div>
            <button
              class="decision-btn verify-btn"
              onclick="showVerifyInput(event)"
            >
              <i class="fas fa-calculator"></i> VERIFY
            </button>

            <div class="verify-input-box" id="verifyBox" style="display: none">
              <input
                type="number"
                id="manualInput"
                placeholder="?"
                min="0"
                max="99"
              />
              <button class="submit-btn" onclick="submitVerification(event)">
                <i class="fas fa-arrow-right"></i> GO
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <audio
      id="drumSound"
      src="https://actions.google.com/sounds/v1/foley/drum_roll.ogg"
    ></audio>

    <script src="js/home.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
